name: Release — PyPI + Desktop

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release (beta channel)'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  # =========================================================================
  # 1. Tag, create GitHub Release, publish to PyPI
  # =========================================================================
  release:
    needs: ci-gate
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Bump version and push tag
        id: bump_version
        uses: mathieudutour/github-tag-action@v6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: patch
          tag_prefix: 'v'

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump_version.outputs.new_version }}" > VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f VERSION
          git commit -m "v${{ steps.bump_version.outputs.new_version }} [skip ci]" || true
          git push origin main || true

      - name: Fetch latest PR info
        id: fetch_pr
        uses: actions/github-script@v6
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'closed', base: 'main', head: 'dev',
              sort: 'updated', direction: 'desc', per_page: 1,
            });
            if (prs.data.length > 0) {
              const pr = prs.data[0];
              return {
                title: pr.title,
                body: (pr.body || 'No description provided').replace(/\r\n/g, '\n'),
                number: pr.number,
                url: pr.html_url,
                author: pr.user.login,
              };
            }
            return null;

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          name: v${{ steps.bump_version.outputs.new_version }}
          body: |
            ## Downloads

            ### Desktop App
            | Platform | Download | Size |
            |----------|----------|------|
            | **Windows** (x64) | [`CachiBot-Setup-${{ steps.bump_version.outputs.new_version }}-win.exe`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/CachiBot-Setup-${{ steps.bump_version.outputs.new_version }}-win.exe) | — |
            | **macOS** (Apple Silicon) | [`CachiBot-${{ steps.bump_version.outputs.new_version }}-mac.dmg`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/CachiBot-${{ steps.bump_version.outputs.new_version }}-mac.dmg) | — |
            | **Linux** (x64 AppImage) | [`CachiBot-${{ steps.bump_version.outputs.new_version }}-linux.AppImage`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/CachiBot-${{ steps.bump_version.outputs.new_version }}-linux.AppImage) | — |
            | **Linux** (x64 .deb) | [`CachiBot-${{ steps.bump_version.outputs.new_version }}-linux.deb`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/CachiBot-${{ steps.bump_version.outputs.new_version }}-linux.deb) | — |
            | **Linux** (x64 .rpm) | [`CachiBot-${{ steps.bump_version.outputs.new_version }}-linux.rpm`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/CachiBot-${{ steps.bump_version.outputs.new_version }}-linux.rpm) | — |

            ### Mobile App
            | Platform | Download | Size |
            |----------|----------|------|
            | **Android** (APK) | [`CachiBot-${{ steps.bump_version.outputs.new_version }}.apk`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/CachiBot-${{ steps.bump_version.outputs.new_version }}.apk) | — |

            > Downloads become available once the build pipeline completes (~10 min after release).

            > **macOS users:** This build is not yet notarized by Apple. After installing, open Terminal and run:
            > ```
            > xattr -cr /Applications/CachiBot.app
            > ```
            > Then open the app normally. This only needs to be done once.

            ### CLI Binary (Terminal Only)
            | Platform | Download | Size |
            |----------|----------|------|
            | **Linux** (x64) | [`cachi-linux-x64.tar.gz`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/cachi-linux-x64.tar.gz) | — |
            | **macOS** (Apple Silicon) | [`cachi-mac-arm64.tar.gz`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/cachi-mac-arm64.tar.gz) | — |
            | **Windows** (x64) | [`cachi-win-x64.zip`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/cachi-win-x64.zip) | — |

            ### Mini Server (Dashboard — no Python required)
            | Platform | Download | Size |
            |----------|----------|------|
            | **Linux** (x64) | [`cachibot-server-mini-linux-x64.tar.gz`](https://github.com/${{ github.repository }}/releases/download/v${{ steps.bump_version.outputs.new_version }}/cachibot-server-mini-linux-x64.tar.gz) | — |

            > Lightweight server with web dashboard, database, and auth. No knowledge base or platform integrations. Ideal for Raspberry Pi, VPS, and edge deployments.

            ### Python Package (pip)
            ```bash
            pip install cachibot==${{ steps.bump_version.outputs.new_version }}          # CLI only
            pip install cachibot[full]==${{ steps.bump_version.outputs.new_version }}     # CLI + server + all extras
            ```

            ---

            ## Changes
            ${{ steps.fetch_pr.outputs.result != 'null' && fromJSON(steps.fetch_pr.outputs.result).body || 'Version update' }}

            ## Details
            - Version: `v${{ steps.bump_version.outputs.new_version }}`
            ${{ steps.fetch_pr.outputs.result != 'null' && format('- PR: #{0} by @{1}', fromJSON(steps.fetch_pr.outputs.result).number, fromJSON(steps.fetch_pr.outputs.result).author) || '' }}
            ${{ steps.fetch_pr.outputs.result != 'null' && format('- PR URL: {0}', fromJSON(steps.fetch_pr.outputs.result).url) || '' }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}

      # --- Build & Publish to PyPI ---

      - name: Fetch all tags
        run: git fetch --all --tags --prune

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-publish
          restore-keys: ${{ runner.os }}-pip-

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Set version
        run: echo "${{ steps.bump_version.outputs.new_version }}" > VERSION

      - name: Fix README images for PyPI
        run: |
          sed -i 's|src="assets/|src="https://raw.githubusercontent.com/${{ github.repository }}/main/assets/|g' README.md
          sed -i 's|href="docs/|href="https://github.com/${{ github.repository }}/blob/main/docs/|g' README.md

      - name: Build Python package
        run: python -m build -o dist/cachibot

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: python -m twine upload dist/cachibot/* --non-interactive --skip-existing

  # =========================================================================
  # 2. Build Python backend binary with PyInstaller  (3 platforms)
  # =========================================================================
  build-backend:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: backend-linux
          - os: macos-latest
            artifact: backend-mac
          - os: windows-latest
            artifact: backend-win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_version }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install CachiBot + PyInstaller
        shell: bash
        run: |
          echo "${{ needs.release.outputs.new_version }}" > VERSION
          pip install -e ".[full]"
          pip install pyinstaller

      - name: Clean __pycache__
        shell: bash
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Build backend binary
        run: pyinstaller cachibot-server.spec --clean

      - name: Smoke test backend binary
        shell: bash
        timeout-minutes: 2
        run: |
          BINARY="./dist/cachibot-server/cachibot-server"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BINARY="./dist/cachibot-server/cachibot-server.exe"
          fi

          PORT=15870
          "$BINARY" --port $PORT --host 127.0.0.1 &
          SERVER_PID=$!

          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:$PORT/api/health" > /dev/null 2>&1; then
              echo "Server healthy after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server exited prematurely"
              exit 1
            fi
            sleep 1
          done

          HEALTH=$(curl -sf "http://127.0.0.1:$PORT/api/health")
          echo "Health: $HEALTH"

          if echo "$HEALTH" | grep -q '"version":"0.0.0-unknown"'; then
            echo "ERROR: Version is 0.0.0-unknown"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          echo "Smoke test passed"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/cachibot-server/

  # =========================================================================
  # 2b. Build CLI-only binary with PyInstaller  (3 platforms)
  # =========================================================================
  build-cli:
    needs: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cachi-linux-x64
            archive_name: cachi-linux-x64.tar.gz
            archive_cmd: tar -czf
          - os: macos-latest
            artifact: cachi-mac-arm64
            archive_name: cachi-mac-arm64.tar.gz
            archive_cmd: tar -czf
          - os: windows-latest
            artifact: cachi-win-x64
            archive_name: cachi-win-x64.zip
            archive_cmd: zip -r

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install CachiBot (core only) + PyInstaller
        shell: bash
        run: |
          echo "${{ needs.release.outputs.new_version }}" > VERSION
          pip install -e .
          pip install pyinstaller

      - name: Clean __pycache__
        shell: bash
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Build CLI binary
        run: pyinstaller cachibot-cli.spec --clean

      - name: Smoke test CLI binary
        shell: bash
        run: |
          BINARY="./dist/cachi/cachi"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BINARY="./dist/cachi/cachi.exe"
          fi
          "$BINARY" --help
          echo "CLI smoke test passed"

      - name: Archive CLI binary
        shell: bash
        run: |
          cd dist
          if [[ "${{ matrix.archive_name }}" == *.zip ]]; then
            ${{ matrix.archive_cmd }} "${{ matrix.archive_name }}" cachi/
          else
            ${{ matrix.archive_cmd }} "${{ matrix.archive_name }}" cachi/
          fi

      - name: Upload CLI archive to GitHub Release
        shell: bash
        run: |
          gh release upload "v${{ needs.release.outputs.new_version }}" \
            "dist/${{ matrix.archive_name }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # 2c. Build mini server binary (Linux only — for Pi / VPS / edge)
  # =========================================================================
  build-server-mini:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_version }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install CachiBot (server extras) + PyInstaller
        run: |
          echo "${{ needs.release.outputs.new_version }}" > VERSION
          pip install -e ".[server]"
          pip install pyinstaller

      - name: Clean __pycache__
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Build mini server binary
        run: pyinstaller cachibot-server-mini.spec --clean

      - name: Smoke test mini server binary
        timeout-minutes: 2
        run: |
          PORT=15870
          ./dist/cachibot-server-mini/cachibot-server-mini --port $PORT --host 127.0.0.1 &
          SERVER_PID=$!

          for i in $(seq 1 60); do
            if curl -sf "http://127.0.0.1:$PORT/api/health" > /dev/null 2>&1; then
              echo "Server healthy after ${i}s"
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "ERROR: Server exited prematurely"
              exit 1
            fi
            sleep 1
          done

          HEALTH=$(curl -sf "http://127.0.0.1:$PORT/api/health")
          echo "Health: $HEALTH"

          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          echo "Mini server smoke test passed"

      - name: Archive mini server binary
        run: |
          cd dist
          tar -czf cachibot-server-mini-linux-x64.tar.gz cachibot-server-mini/

      - name: Upload to GitHub Release
        run: |
          gh release upload "v${{ needs.release.outputs.new_version }}" \
            "dist/cachibot-server-mini-linux-x64.tar.gz" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # 3. Build Electron desktop app  (3 platforms)
  # =========================================================================
  build-desktop:
    needs: [release, build-backend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            backend_artifact: backend-linux
          - os: macos-latest
            platform: mac
            backend_artifact: backend-mac
          - os: windows-latest
            platform: win
            backend_artifact: backend-win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_version }}

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Set desktop app version
        working-directory: desktop
        run: npm version ${{ needs.release.outputs.new_version }} --no-git-tag-version

      - name: Install Electron dependencies
        working-directory: desktop
        run: npm ci

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.backend_artifact }}
          path: build/backend

      - name: Make backend executable
        if: matrix.platform != 'win'
        run: chmod +x build/backend/cachibot-server

      - name: Install RPM tools
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # Build Electron app (unsigned — notarization disabled for now)
      - name: Build Electron app
        working-directory: desktop
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            npx electron-builder --mac --publish always
          elif [[ "${{ matrix.platform }}" == "win" ]]; then
            npx electron-builder --win --publish always
          else
            npx electron-builder --linux --publish always
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Sign Windows installer with Azure Trusted Signing
      - name: Sign Windows installer
        if: matrix.platform == 'win'
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}/release
          files-folder-filter: exe

      # Re-upload signed Windows exe and regenerate latest.yml
      - name: Upload signed exe and update latest.yml
        if: matrix.platform == 'win'
        shell: bash
        run: |
          VERSION="${{ needs.release.outputs.new_version }}"
          EXE_NAME="CachiBot-Setup-${VERSION}-win.exe"
          EXE_PATH="${{ github.workspace }}/release/${EXE_NAME}"
          if [[ -f "$EXE_PATH" ]]; then
            gh release upload "v${VERSION}" "$EXE_PATH" --clobber
            SHA512=$(openssl dgst -sha512 -binary "$EXE_PATH" | openssl base64 -A)
            SIZE=$(wc -c < "$EXE_PATH" | tr -d ' ')
            RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
            printf 'version: %s\nfiles:\n  - url: %s\n    sha512: %s\n    size: %s\npath: %s\nsha512: %s\nreleaseDate: '\''%s'\''\n' \
              "$VERSION" "$EXE_NAME" "$SHA512" "$SIZE" "$EXE_NAME" "$SHA512" "$RELEASE_DATE" > latest.yml
            gh release upload "v${VERSION}" latest.yml --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # 4. Build Flutter APK (Android)
  # =========================================================================
  build-mobile:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_version }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build APK
        working-directory: mobile
        run: |
          flutter build apk --release \
            --build-name=${{ needs.release.outputs.new_version }} \
            --build-number=${{ github.run_number }}

      - name: Rename APK
        run: |
          mv mobile/build/app/outputs/flutter-apk/app-release.apk \
             CachiBot-${{ needs.release.outputs.new_version }}.apk

      - name: Upload APK to GitHub Release
        run: |
          gh release upload "v${{ needs.release.outputs.new_version }}" \
            "CachiBot-${{ needs.release.outputs.new_version }}.apk" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =========================================================================
  # 5. Update release body with actual asset sizes
  # =========================================================================
  update-release:
    needs: [release, build-cli, build-server-mini, build-desktop, build-mobile]
    runs-on: ubuntu-latest

    steps:
      - name: Update release body with asset sizes
        uses: actions/github-script@v6
        with:
          script: |
            const version = '${{ needs.release.outputs.new_version }}';
            const releaseId = ${{ needs.release.outputs.release_id }};

            // Fetch release to get assets and current body
            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            // Build a map of asset name -> human-readable size
            const sizeMap = {};
            for (const asset of release.data.assets) {
              const bytes = asset.size;
              let size;
              if (bytes >= 1024 * 1024 * 1024) {
                size = (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
              } else if (bytes >= 1024 * 1024) {
                size = (bytes / (1024 * 1024)).toFixed(1) + ' MB';
              } else if (bytes >= 1024) {
                size = (bytes / 1024).toFixed(1) + ' KB';
              } else {
                size = bytes + ' B';
              }
              sizeMap[asset.name] = size;
            }

            // Replace "— |" placeholders in the table with actual sizes
            let body = release.data.body;
            for (const [name, size] of Object.entries(sizeMap)) {
              // Match the table row containing this filename and replace the trailing "— |"
              const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const pattern = new RegExp(`(\\[` + '`' + escaped + '`' + `\\][^|]+\\|)\\s*—\\s*\\|`);
              body = body.replace(pattern, `$1 ${size} |`);
            }

            // Remove the "downloads become available" note since they're ready now
            body = body.replace(/\n> Desktop downloads become available[^\n]*\n?/, '\n');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: body,
            });
